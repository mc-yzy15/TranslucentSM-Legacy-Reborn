name: '📚 iFlow Documentation Generation'

on:
  push:
    branches:
      - master
      - dev
    paths:
      - 'src/**'
      - 'README.md'
      - '**.md'
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'synchronize'
  schedule:
    # Run daily at 2 AM UTC to keep docs fresh
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch for documentation generation'
        required: false
        default: 'dev'
        type: 'string'

permissions:
  contents: 'write'
  pull-requests: 'write'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  docs-generation:
    runs-on: 'ubuntu-latest'
    steps:
      - name: '📥 Checkout Repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: '${{ github.event.inputs.target_branch || github.ref_name }}'

      - name: '📚 Generate Documentation with iFlow'
        uses: iflow-ai/iflow-cli-action@v2.0.0
        id: 'iflow_docs_gen'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          REPOSITORY: '${{ github.repository }}'
          BRANCH: '${{ github.event.inputs.target_branch || github.ref_name }}'
        with:
          api_key: '${{ secrets.IFLOW_API_KEY }}'
          timeout: '3600'
          debug: 'true'
          prompt: |
            ## Role
            You are a technical documentation writer specializing in C/C++ Windows applications. Generate comprehensive documentation for the TranslucentSM project.
            
            ## Steps
            1. Analyze the codebase structure and identify key components
            2. Generate API documentation from code comments
            3. Update the README.md with current project information
            4. Create or update CONTRIBUTING.md guidelines
            5. Generate architecture documentation
            6. Update CHANGELOG.md with recent changes
            7. Ensure all documentation is consistent and up-to-date
            
            ## Requirements
            - **API Documentation**: Generate detailed API docs for all public functions and structures
            - **README**: Keep project overview, features, installation, and usage sections updated
            - **CONTRIBUTING**: Provide clear guidelines for contributors
            - **Architecture**: Document the overall system design and component interactions
            - **CHANGELOG**: Update with recent commits and changes
            
            ## Output
            - Updated documentation files in the repository
            - A summary of changes made to the documentation
            
            ## Commands to Use
            - `find src -name "*.c" -o -name "*.h"` - List all source files
            - `cat README.md` - View current README
            - `git log --oneline --since="1 month ago"` - Get recent commits
            - `ls -la` - List files and directories
            
            ## Guidelines
            - Keep documentation concise and clear
            - Use Markdown format consistently
            - Follow existing documentation style
            - Include code examples where appropriate
            - Update documentation only when necessary
            - Don't modify functional code, only documentation
      - name: '📝 Commit Documentation Changes'
        if: ${{ steps.iflow_docs_gen.outputs.result }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add .
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "📚 Auto-update documentation by iFlow"
            git push origin ${{ github.event.inputs.target_branch || github.ref_name }}
          }

      - name: '✅ Documentation Update Summary'
        if: ${{ steps.iflow_docs_gen.outputs.result }}
        uses: 'actions/github-script@v7'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |
            const result = `${{ steps.iflow_docs_gen.outputs.result }}`;
            
            // Create a summary comment
            const summary = `## 📚 Documentation Generation Summary
            
            ${result}
            
            ### Changes Applied:
            - API documentation updated
            - README.md reviewed and refreshed
            - Architecture documentation generated
            - CHANGELOG.md updated with recent changes
            `;
            
            // Add summary as a PR comment if this is a PR
            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: summary
              });
            } else {
              // Otherwise, just log the summary
              console.log(summary);
            }

      - name: '❌ Handle Documentation Generation Failure'
        if: ${{ failure() && steps.iflow_docs_gen.outcome == 'failure' }}
        uses: 'actions/github-script@v7'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request?.number,
              body: '🚨 Documentation generation failed. Please check the workflow logs for details.'
            });
