name: CI/CD Pipeline

on:
  push:
    branches: [ dev ]
  pull_request:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: Debug
            solution_platform: x64
            output_platform: x64
          - configuration: Release
            solution_platform: x64
            output_platform: x64
          - configuration: Debug
            solution_platform: x86
            output_platform: Win32
          - configuration: Release
            solution_platform: x86
            output_platform: Win32

    steps:
      - uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore start.sln

      - name: Build StartTAP
        run: msbuild start.sln /m /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.solution_platform }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StartTAP-${{ matrix.solution_platform }}-${{ matrix.configuration }}
          path: build/msbuild/${{ matrix.output_platform }}/${{ matrix.configuration }}/StartTAP.dll
