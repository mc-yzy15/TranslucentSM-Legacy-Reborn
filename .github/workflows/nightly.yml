name: Nightly Build

on:
  schedule:
    # Run every day at 00:00 UTC, only on dev branch
    - cron: '0 0 * * *'
  push:
    branches:
      - dev
  # Allow manual trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Release, Debug]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        
      - name: Create build directory
        run: mkdir -p build
        
      - name: Run CMake
        run: |
          cd build
          cmake .. -G "Visual Studio 17 2022" -A Win32
        
      - name: Build with MSBuild
        run: |
          cd build
          msbuild TranslucentSM.sln -p:Configuration=${{ matrix.build_type }}
        
      - name: Package artifacts
        run: |
          $buildType = "${{ matrix.build_type }}"
          mkdir -p artifacts
          cp build/bin/$buildType/TranslucentSM.exe artifacts/
          cp build/bin/$buildType/TranslucentSM.dll artifacts/
        
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'schedule' }}
        with:
          tag_name: nightly-${{ github.run_id }}
          name: Nightly Build ${{ github.run_id }}
          body: "Automatic nightly build"
          draft: false
          prerelease: true
          files:
            - artifacts/TranslucentSM.exe
            - artifacts/TranslucentSM.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
