name: Nightly Build

on:
  schedule:
    # Run every day at 00:00 UTC, only on dev branch
    - cron: '0 0 * * *'
  push:
    branches:
      - dev
  # Allow manual trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Release, Debug]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: 🔍 iFlow Code Analysis (Pre-Build)
        uses: iflow-ai/iflow-cli-action@v2.0.0
        id: iflow_code_analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        with:
          api_key: ${{ secrets.IFLOW_API_KEY }}
          timeout: "1800"
          debug: "true"
          prompt: |
            ## Role
            You are a code quality analyst specializing in Windows C/C++ applications. Analyze the codebase before build.
            
            ## Steps
            1. Analyze the codebase structure and architecture
            2. Run static code analysis to identify potential issues
            3. Check for security vulnerabilities, especially in Windows API usage and DLL injection code
            4. Verify adherence to C99/C11 standards
            5. Check for proper error handling and memory management
            6. Evaluate code readability and maintainability
            
            ## Output
            Generate a concise code analysis report highlighting:
            - Architecture overview
            - Potential security issues
            - Code quality concerns
            - Suggestions for improvement
        continue-on-error: true
        
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        
      - name: Create build directory
        run: mkdir -p build
        
      - name: Run CMake
        run: |
          cd build
          cmake .. -G "Visual Studio 17 2022" -A Win32
        
      - name: Build with MSBuild
        run: |
          cd build
          msbuild TranslucentSM.sln -p:Configuration=${{ matrix.build_type }}
        
      - name: Package artifacts
        run: |
          $buildType = "${{ matrix.build_type }}"
          mkdir -p artifacts
          cp build/bin/$buildType/TranslucentSM.exe artifacts/
          cp build/bin/$buildType/TranslucentSM.dll artifacts/
        
      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'schedule' }}
        with:
          tag_name: nightly-${{ github.run_id }}
          name: Nightly Build ${{ github.run_id }}
          body: "Automatic nightly build"
          draft: false
          prerelease: true
          files:
            - artifacts/TranslucentSM.exe
            - artifacts/TranslucentSM.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
