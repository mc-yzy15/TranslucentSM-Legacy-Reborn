name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore start.sln

      - name: Build StartTAP x64 Release
        run: msbuild start.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Build StartTAP x86 Release
        run: msbuild start.sln /m /p:Configuration=Release /p:Platform=x86

      - name: Package nightly assets
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/StartTAP-x64 | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts/StartTAP-x86 | Out-Null
          Copy-Item build/msbuild/x64/Release/StartTAP.dll artifacts/StartTAP-x64/StartTAP.dll
          Copy-Item build/msbuild/Win32/Release/StartTAP.dll artifacts/StartTAP-x86/StartTAP.dll
          Compress-Archive -Path artifacts/StartTAP-x64/* -DestinationPath artifacts/StartTAP-x64.zip -Force
          Compress-Archive -Path artifacts/StartTAP-x86/* -DestinationPath artifacts/StartTAP-x86.zip -Force

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_id }}
          name: Nightly Build ${{ github.run_id }}
          body: |
            Automatic nightly StartTAP build.

            Assets:
            - StartTAP x64
            - StartTAP x86
          draft: false
          prerelease: true
          files: |
            artifacts/StartTAP-x64.zip
            artifacts/StartTAP-x86.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
